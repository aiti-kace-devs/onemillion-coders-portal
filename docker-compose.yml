# ==============================================================================
# OMCP Docker Compose Configuration
# ==============================================================================
#
# SECURITY ARCHITECTURE:
# ----------------------
# - Traefik acts as the ONLY gateway to all services
# - All services use 'expose' instead of 'ports' - they are NOT published to host
# - Services are only accessible through Traefik on the internal Docker network
# - Only Traefik exposes port 80 to the host machine
# - All HTTP traffic must go through the Traefik reverse proxy
#
# SERVICE ACCESS:
# ---------------
# - Backend API:  http://api.omcp.localhost  (or api.{APP_DOMAIN})
# - Frontend:     http://omcp.localhost      (or {APP_DOMAIN})
# - PhpMyAdmin:   http://dbms.omcp.localhost    (Traefik HTTP Basic Auth)
# - Traefik UI:   http://lb.omcp.localhost      (Traefik HTTP Basic Auth)
# - Mailpit UI:   http://mail.omcp.localhost    (Traefik HTTP Basic Auth)
#
# PROFILES:
# ---------
# - backend:  Runs backend services (API, database, redis, queue, mailpit)
# - frontend: Runs frontend services (website, traefik)
#
# ==============================================================================

services:
  traefik:
    profiles: ["backend", "frontend"]
    image: traefik:v3.6
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "${TRAEFIK_PORT:-80}:80"
      # - "8082:8080" # Traefik Dashboard
    labels:
      - "traefik.enable=true"
      # HTTP Basic Auth for dashboard, PhpMyAdmin, Mailpit (credentials from env)
      - "traefik.http.middlewares.gate-auth.basicauth.users=${TRAEFIK_BASIC_AUTH_USER}:${TRAEFIK_BASIC_AUTH_HASH}"

      # Dashboard (via /dashboard/) - protected by Basic Auth
      - "traefik.http.routers.api.rule=Host(`lb.${APP_DOMAIN:-omcp.localhost}`)"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.middlewares=gate-auth"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - ./certs:/etc/traefik/certs:ro
    networks:
      - omcp-network

  db:
    profiles: ["backend"]
    image: mysql:8.0
    container_name: omcp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-omcp_db}
      MYSQL_USER: ${MYSQL_USER:-omcp_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-omcp_pass}
    volumes:
      - omcp_db_data:/var/lib/mysql
    networks:
      - omcp-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    profiles: ["backend"]
    image: redis:alpine
    container_name: omcp_redis
    restart: unless-stopped
    networks:
      - omcp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

  phpmyadmin-storage-init:
    profiles: ["backend"]
    image: mysql:8.0
    container_name: omcp_phpmyadmin_storage_init
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      PMA_CONTROLPASS: ${PMA_CONTROLPASS:-pmapass}
    volumes:
      - ./dbms:/scripts:ro
    command: ["sh", "/scripts/init.sh"]
    networks:
      - omcp-network

  phpmyadmin:
    profiles: ["backend"]
    image: phpmyadmin/phpmyadmin:latest
    container_name: omcp_phpmyadmin
    restart: unless-stopped
    # NOTE: No ports exposed to host - only accessible through Traefik gateway
    expose:
      - "80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_pass}
      - PMA_PMADB=phpmyadmin
      - PMA_CONTROLUSER=pma
      - PMA_CONTROLPASS=${PMA_CONTROLPASS:-pmapass}
      - UPLOAD_LIMIT=${PMA_UPLOAD_LIMIT:-256M}
      - MAX_EXECUTION_TIME=600
    depends_on:
      phpmyadmin-storage-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`dbms.${APP_DOMAIN:-omcp.localhost}`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=web"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
      - "traefik.http.routers.phpmyadmin.middlewares=gate-auth"
    networks:
      - omcp-network

  backend:
    profiles: ["backend"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: omcp-backend:latest
    container_name: omcp_backend
    restart: unless-stopped
    # NOTE: No ports exposed - only accessible through Traefik gateway
    expose:
      - "8080" # Internal port only, not published to host
    environment:
      - RUN_QUEUE_WORKER=false
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`app.${APP_DOMAIN:-omcp.localhost}`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
      # Buffering middleware for large headers
      - "traefik.http.middlewares.buffer-limit.buffering.maxResponseBodyBytes=5000000"
      - "traefik.http.middlewares.buffer-limit.buffering.memResponseBodyBytes=5000000"
      - "traefik.http.middlewares.buffer-limit.buffering.maxRequestBodyBytes=5000000"
      - "traefik.http.middlewares.buffer-limit.buffering.memRequestBodyBytes=5000000"
      # Apply multiple middlewares: CORS and security headers
      - "traefik.http.routers.backend.middlewares=cors,security-headers"
      # CORS middleware
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolmaxage=100"
      - "traefik.http.middlewares.cors.headers.addvaryheader=true"
      # Security headers middleware
      - "traefik.http.middlewares.security-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.security-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=false"
      - "traefik.http.middlewares.security-headers.headers.contentSecurityPolicy=frame-ancestors 'self' https://app.${APP_DOMAIN:-omcp.localhost}"
      - "traefik.http.middlewares.security-headers.headers.sslredirect=false"
      - "traefik.http.middlewares.security-headers.headers.stsincludesubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stspreload=true"
      - "traefik.http.middlewares.security-headers.headers.stsseconds=31536000"
    networks:
      - omcp-network

  queue:
    profiles: ["backend"]
    image: omcp-backend:latest
    container_name: omcp_queue
    restart: unless-stopped
    env_file: .env
    environment:
      - RUN_QUEUE_WORKER=true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - omcp-network

  website:
    profiles: ["frontend"]
    build:
      context: ./website
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=.env
    container_name: omcp_website
    restart: unless-stopped
    env_file: .env
    # NOTE: No ports exposed - only accessible through Traefik gateway
    expose:
      - "3000" # Internal port only, not published to host
    # depends_on:
    #   - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.website.rule=Host(`${APP_DOMAIN:-omcp.localhost}`)"
      - "traefik.http.routers.website.entrypoints=web"
      - "traefik.http.routers.website.priority=1"
      - "traefik.http.services.website.loadbalancer.server.port=3000"
      # Apply security headers
      - "traefik.http.routers.website.middlewares=website-security"
      - "traefik.http.middlewares.website-security.headers.browserxssfilter=true"
      - "traefik.http.middlewares.website-security.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.website-security.headers.frameDeny=false"
      - "traefik.http.middlewares.website-security.headers.contentSecurityPolicy=frame-ancestors 'self' app.${APP_DOMAIN:-omcp.localhost}"
      - "traefik.http.middlewares.website-security.headers.sslredirect=false"
    networks:
      - omcp-network

  mailpit:
    profiles: ["backend"]
    image: axllent/mailpit:latest
    container_name: omcp_mailpit
    restart: unless-stopped
    # NOTE: No ports exposed - only accessible through Traefik gateway
    expose:
      - "8025" # Internal port only, not published to host
    environment:
      - MP_DATA_DIR=/data
    volumes:
      - omcp_mailpit_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailpit.rule=Host(`mail.${APP_DOMAIN:-omcp.localhost}`)"
      - "traefik.http.routers.mailpit.entrypoints=web"
      - "traefik.http.services.mailpit.loadbalancer.server.port=8025"
      # Basic Auth then security headers
      - "traefik.http.routers.mailpit.middlewares=gate-auth,mailpit-security"
      - "traefik.http.middlewares.mailpit-security.headers.browserxssfilter=true"
      - "traefik.http.middlewares.mailpit-security.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.mailpit-security.headers.frameDeny=true"
    networks:
      - omcp-network

networks:
  omcp-network:
    driver: bridge

volumes:
  omcp_db_data:
  omcp_mailpit_data:
