[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/html/one-mil-coders/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=8
redirect_stderr=true
stdout_logfile=/var/www/html/one-mil-coders/worker.log
stopwaitsecs=3600

[program:horizon]
process_name=%(program_name)s
command=php /var/www/html/one-mil-coders/artisan horizon
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/html/one-mil-coders/horizon.log
stopwaitsecs=3600
