title: Details
fields:
  -
    field:
      type: text
      display: Name
    handle: name
  -
    field:
      type: text
      display: Caption
    handle: caption
  -
    field:
      type: icon
      display: Icon
    handle: icon
  -
    field:
      type: color
      display: Colour
    handle: colour
  -
    field:
      type: text
      display: Value
    handle: value
  -
    field:
      type: assets
      folder: uploads
      display: Media
      container: google_cloud
      max_files: 1
    handle: details_media
  -
    field:
      type: text
      display: 'Button Text'
    handle: button_text
  -
    field:
      type: markdown
      display: Description
      escape_markup: true
    handle: description
