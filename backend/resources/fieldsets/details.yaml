title: Details
fields:
  -
    handle: name
    field:
      type: text
      display: Name
  -
    handle: caption
    field:
      type: text
      display: Caption
  -
    handle: icon
    field:
      type: icon
      display: Icon
  -
    handle: colour
    field:
      type: color
      display: Colour
  -
    handle: value
    field:
      type: text
      display: Value
  -
    handle: details_media
    field:
      container: google_cloud
      type: assets
      display: Media
      max_files: 1
      folder: uploads
  -
    handle: button_text
    field:
      type: text
      display: 'Button Text'
  -
    handle: description
    field:
      escape_markup: true
      type: markdown
      display: Description
