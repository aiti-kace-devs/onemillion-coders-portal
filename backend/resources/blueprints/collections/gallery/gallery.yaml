tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: assets
              folder: uploads
              display: Image
              container: google_cloud
              max_files: 1
              min_files: 1
            handle: image
          -
            field:
              type: text
              display: Caption
            handle: caption
          -
            field:
              type: taggable
              display: Tag
            handle: tag
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: Gallery
