tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: steps
            field:
              type: replicator
              display: Steps
              instructions: 'The blocks used for this page'
              sets:
                new_set_group:
                  display: 'New Set Group'
                  sets:
                    section:
                      display: Section
                      icon: addon-boxes-stack
                      fields:
                        -
                          handle: name
                          field:
                            type: text
                            display: Name
                            validate:
                              - required
                              - alpha_dash
                            placeholder: 'Block Name'
                            instructions: 'The block name'
                        -
                          handle: caption
                          field:
                            type: text
                            display: Caption
                        -
                          handle: description
                          field:
                            escape_markup: true
                            type: markdown
                            display: Description
                        -
                          handle: images
                          field:
                            container: google_cloud
                            type: assets
                            display: Images
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: parent
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
title: Page
