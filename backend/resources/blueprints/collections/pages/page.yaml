tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: markdown
              localizable: true
              escape_markup: true
            handle: content
          -
            field:
              sets:
                new_set_group:
                  sets:
                    section:
                      icon: addon-boxes-stack
                      fields:
                        -
                          field:
                            type: text
                            display: Name
                            validate:
                              - required
                              - alpha_dash
                            placeholder: 'Block Name'
                            instructions: 'The block name'
                          handle: name
                        -
                          field:
                            type: text
                            display: Caption
                          handle: caption
                        -
                          field:
                            type: text
                            display: Description
                          handle: description
                        -
                          field:
                            type: entries
                            display: 'Section Items'
                            listable: true
                            sortable: false
                            validate:
                              - required
                            instructions: 'The collection items for this block'
                          handle: section_items
                      display: Section
                  display: 'New Set Group'
              type: replicator
              display: Sections
              instructions: 'The blocks used for this page'
            handle: sections
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
          -
            field:
              type: entries
              listable: false
              max_items: 1
              collections:
                - pages
              localizable: true
            handle: parent
title: Page
