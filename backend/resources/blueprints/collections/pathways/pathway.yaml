tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: text
              display: Subtitle
            handle: subtitle
          -
            field:
              type: textarea
              display: Description
            handle: description
          -
            field:
              type: select
              width: 50
              display: Icon
              options:
                -
                  key: home
                  value: Home
                -
                  key: users
                  value: Users
              taggable: true
            handle: icon
          -
            field:
              type: text
              width: 50
              display: Duration
            handle: duration
          -
            field:
              type: text
              display: Focus
            handle: focus
          -
            field:
              type: assets
              folder: uploads
              display: 'Hero Image'
              container: google_cloud
              max_files: 1
              min_files: 1
            handle: hero_image
          -
            field:
              type: group
              fields:
                -
                  field:
                    type: textarea
                    display: Challenge
                    validate:
                      - required
                  handle: challenge
                -
                  field:
                    type: textarea
                    display: Solution
                    validate:
                      - required
                  handle: solution
                -
                  field:
                    type: list
                    display: Benefits
                    validate:
                      - required
                  handle: benefits
              display: Overview
            handle: overview
          -
            field:
              type: group
              fields:
                -
                  field:
                    sets:
                      new_set_group:
                        sets:
                          phase_items:
                            fields:
                              -
                                field:
                                  type: text
                                  display: Title
                                  validate:
                                    - required
                                handle: title
                              -
                                field:
                                  type: text
                                  display: Description
                                handle: description
                              -
                                field:
                                  type: list
                                  display: Modules
                                  validate:
                                    - required
                                handle: modules
                            display: 'Phase Items'
                        display: 'New Set Group'
                    type: replicator
                    display: Phases
                  handle: phases
              display: 'Learning Path'
            handle: learning_path
          -
            field:
              type: group
              fields:
                -
                  field:
                    type: text
                    display: Mentorship
                  handle: mentorship
                -
                  field:
                    type: text
                    display: Community
                  handle: community
                -
                  field:
                    type: list
                    display: Resources
                  handle: resources
              display: Support
            handle: support
          -
            field:
              sets:
                new_set_group:
                  sets:
                    section:
                      fields:
                        -
                          field:
                            type: text
                            display: Title
                            validate:
                              - required
                          handle: title
                        -
                          field:
                            type: entries
                            display: 'Section Items'
                            validate:
                              - required
                          handle: section_items
                      display: Section
                  display: 'New Set Group'
              type: replicator
              display: Sections
            handle: sections
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: Pathway
