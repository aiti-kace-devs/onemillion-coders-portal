tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: markdown
              display: Content
              escape_markup: true
            handle: content
          -
            field:
              type: assets
              folder: uploads
              display: Images
              container: google_cloud
              max_files: 3
              min_files: 1
            handle: images
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: 'About Mission'
