title: 'About Mission'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: content
            field:
              escape_markup: true
              type: markdown
              display: Content
          -
            handle: images
            field:
              max_files: 3
              min_files: 1
              container: google_cloud
              folder: uploads
              type: assets
              display: Images
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
