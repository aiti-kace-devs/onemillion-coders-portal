tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            import: button
            prefix: first_
          -
            import: button
            prefix: second_
          -
            import: details
            prefix: about_
          -
            field:
              type: text
              width: 50
              display: 'Metric Caption'
            handle: metric_caption
          -
            field:
              type: text
              width: 50
              display: 'Metric Value'
            handle: metric_value
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: About
