tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            import: details
          -
            field:
              sets:
                new_set_group:
                  sets:
                    story:
                      fields:
                        -
                          field:
                            type: text
                            width: 33
                            display: 'Graduate Name'
                            validate:
                              - required
                          handle: graduate_name
                        -
                          field:
                            type: text
                            width: 33
                            display: 'Program Completed'
                          handle: program_completed
                        -
                          field:
                            type: text
                            width: 33
                            display: Sector
                          handle: sector
                        -
                          field:
                            type: textarea
                            display: Message
                          handle: message
                      display: Story
                  display: 'New Set Group'
              type: replicator
              display: Stories
            handle: stories
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: Success-Stories
