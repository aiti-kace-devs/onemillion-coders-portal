tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            import: details
            prefix: text_data_
          -
            field:
              sets:
                new_set_group:
                  sets:
                    metric:
                      fields:
                        -
                          field:
                            type: icon
                            width: 33
                            display: Icon
                          handle: icon_field
                        -
                          field:
                            type: text
                            width: 33
                            display: Number
                          handle: number
                        -
                          field:
                            type: text
                            width: 33
                            display: Description
                          handle: description
                      display: Metric
                  display: 'New Set Group'
              type: replicator
              display: Metrics
            handle: metrics
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: Metrics
