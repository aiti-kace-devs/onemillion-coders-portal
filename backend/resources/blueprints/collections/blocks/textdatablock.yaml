tabs:
  main:
    display: Main
    sections:
      - fields:
          - field:
              type: text
              required: true
              validate:
                - required
            handle: title
          - import: details
            prefix: text_data_
          - field:
              sets:
                new_set_group:
                  sets:
                    metric:
                      fields:
                        - field:
                            type: icon
                            width: 33
                            display: Icon
                          handle: icon_field
                        - field:
                            type: text
                            width: 33
                            display: Number
                          handle: number
                        - field:
                            type: text
                            width: 33
                            display: Description
                          handle: description
                      display: Metric
                  display: "New Set Group"
              type: replicator
              display: Metrics
            handle: metrics
          - field:
              type: integer
              display: "Users registered"
              instructions: "Automated total from the database (scheduled job). Read-only — use Metrics above for labels and presentation only."
              read_only: true
              localizable: false
            handle: live_users_registered
          - field:
              type: integer
              display: "Districts"
              instructions: "Active districts count — maintained by the system."
              read_only: true
              localizable: false
            handle: live_districts
          - field:
              type: integer
              display: "Students trained"
              instructions: "Confirmed admissions count — maintained by the system."
              read_only: true
              localizable: false
            handle: live_students_trained
  sidebar:
    display: Sidebar
    sections:
      - fields:
          - field:
              type: slug
              validate: "max:200"
              localizable: true
            handle: slug
title: Metrics
