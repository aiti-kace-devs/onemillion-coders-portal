tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: text
              display: Name
            handle: name
          -
            field:
              type: textarea
              display: Description
            handle: description
          -
            field:
              sets:
                new_set_group:
                  sets:
                    metric:
                      fields:
                        -
                          field:
                            type: text
                            width: 50
                            display: Number
                          handle: number
                        -
                          field:
                            type: text
                            width: 50
                            display: Description
                          handle: description
                      display: Metric
                  display: 'New Set Group'
              type: replicator
              display: Metrics
            handle: metrics
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: Pathway
