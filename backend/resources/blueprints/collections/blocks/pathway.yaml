title: Pathway
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: name
            field:
              type: text
              display: Name
          -
            handle: description
            field:
              type: textarea
              display: Description
          -
            handle: metrics
            field:
              type: replicator
              display: Metrics
              sets:
                new_set_group:
                  display: 'New Set Group'
                  sets:
                    metric:
                      display: Metric
                      fields:
                        -
                          handle: number
                          field:
                            type: text
                            display: Number
                            width: 50
                        -
                          handle: description
                          field:
                            type: text
                            display: Description
                            width: 50
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
