tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              mode: grid
              type: assets
              display: content
              validate:
                - required
              container: public
              max_files: 1
              min_files: 1
            handle: content
          -
            import: details
          -
            import: button
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: MediaBlock
