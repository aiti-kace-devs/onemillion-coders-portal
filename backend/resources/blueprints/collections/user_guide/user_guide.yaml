tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: textarea
              display: Description
            handle: description
          -
            field:
              sets:
                new_set_group:
                  sets:
                    step_details:
                      fields:
                        -
                          field:
                            type: text
                            display: Name
                            validate:
                              - required
                          handle: name
                        -
                          field:
                            type: assets
                            folder: uploads
                            display: Image
                            container: google_cloud
                            min_files: 1
                          handle: image
                        -
                          field:
                            type: list
                            display: Instruction
                            validate:
                              - required
                          handle: instruction
                      display: 'Step Details'
                  display: 'New Set Group'
              type: replicator
              display: Steps
            handle: steps
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: 'User Guide'
