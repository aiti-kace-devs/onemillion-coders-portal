tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: content
            field:
              type: markdown
              localizable: true
          -
            handle: media
            field:
              max_files: 1
              container: google_cloud
              type: assets
              display: Media
              folder: uploads
          -
            import: button
            prefix: slider_
          -
            import: details
            prefix: slider_
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
title: Slider
