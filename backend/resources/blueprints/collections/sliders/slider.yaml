tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: markdown
              localizable: true
              escape_markup: true
            handle: content
          -
            field:
              type: assets
              folder: uploads
              display: Media
              container: google_cloud
              max_files: 1
            handle: media
          -
            import: button
            prefix: slider_
          -
            import: details
            prefix: slider_
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: Slider
