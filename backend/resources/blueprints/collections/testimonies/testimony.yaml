tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Name
          -
            handle: profession
            field:
              type: text
              display: Profession
          -
            handle: image
            field:
              max_files: 1
              min_files: 1
              container: google_cloud
              folder: uploads
              type: assets
              display: Image
          -
            handle: message
            field:
              type: textarea
              display: Message
              validate:
                - required
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
title: Testimony
