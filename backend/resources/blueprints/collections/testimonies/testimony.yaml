tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              display: Name
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: text
              display: Profession
            handle: profession
          -
            field:
              type: assets
              folder: uploads
              display: Image
              container: google_cloud
              max_files: 1
              min_files: 1
            handle: image
          -
            field:
              type: textarea
              display: Message
              validate:
                - required
            handle: message
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: Testimony
