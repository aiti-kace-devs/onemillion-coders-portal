tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: text
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: markdown
              display: Answer
              localizable: true
              escape_markup: true
            handle: answer
          -
            field:
              type: taggable
              display: Tag
            handle: tag
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate: 'max:200'
              localizable: true
            handle: slug
title: Faq
