tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: answer
            field:
              type: markdown
              localizable: true
              display: Answer
              escape_markup: true
          -
            handle: tag
            field:
              type: taggable
              display: Tag
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
title: Faq
