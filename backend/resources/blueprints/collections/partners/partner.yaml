tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate:
                - 'max:200'
          -
            handle: title
            field:
              type: text
              required: true
              width: 50
              validate:
                - required
          -
            handle: caption
            field:
              type: text
              display: Caption
              width: 50
          -
            handle: image
            field:
              max_files: 1
              min_files: 1
              container: google_cloud
              folder: uploads
              type: assets
              display: Image
              validate:
                - required
          -
            handle: link_field
            field:
              type: link
              display: Link
  sidebar:
    display: Sidebar
    sections:
      - {  }
title: Partner
