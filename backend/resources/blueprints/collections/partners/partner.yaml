tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            field:
              type: slug
              validate:
                - 'max:200'
              localizable: true
            handle: slug
          -
            field:
              type: text
              width: 50
              required: true
              validate:
                - required
            handle: title
          -
            field:
              type: text
              width: 50
              display: Caption
            handle: caption
          -
            field:
              type: assets
              folder: uploads
              display: Image
              validate:
                - required
              container: google_cloud
              max_files: 1
              min_files: 1
            handle: image
          -
            field:
              type: link
              display: Link
            handle: link_field
  sidebar:
    display: Sidebar
    sections:
      - {  }
title: Partner
