tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              placeholder: 'Enter your name'
              type: text
              display: Name
              validate:
                - required
          -
            handle: email
            field:
              input_type: email
              placeholder: 'Enter your email'
              type: text
              display: Email
              validate:
                - required
                - email
          -
            handle: phone
            field:
              input_type: tel
              placeholder: 'Enter your phone number'
              type: text
              display: Phone
              validate:
                - phone
          -
            handle: subject
            field:
              placeholder: 'Enter subject'
              type: text
              display: Subject
          -
            handle: message
            field:
              placeholder: 'Enter your message'
              type: textarea
              display: Message
              validate:
                - required
