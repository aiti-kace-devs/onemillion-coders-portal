title: 'Terms And Privacy'
data:
  content: "1. Introduction<br>The One Million Coders Programme is committed to protecting the privacy and personal data of all participants, applicants, and visitors. This Privacy Policy explains how we collect, use, store, share, and protect your personal information, in compliance with the Data Protection Act, 2012 (Act 843) of Ghana. By registering for or participating in the Programme, you acknowledge that you have read and understood this Privacy Policy.<br><br>2. Data Controller<br>The data controller responsible for your personal information is the Ministry of Communications and Digital Technology Innovation (MoCDTI), acting on behalf of the One Million Coders Programme, in collaboration with its implementing partners: GIFEC, NITA, Ghana Digital Centre, and GI-KACE.<br><br>3. Information We Collect<br>We collect information you provide during registration, including your full name, date of birth, gender, national identification number, contact information, educational qualifications, employment status, and course selections. We may also automatically collect device information, IP address, and usage data when you access our digital platforms.<br><br>\_4. How We Use Your Information<br>We use your personal information to process and verify your registration, enrol you in courses, communicate Programme updates, issue certificates, monitor progress, improve the Programme, comply with legal obligations, and connect participants with potential industry employers where consent has been provided.<br><br>5. Legal Basis for Processing<br>We process your personal data on the basis of your consent, contractual necessity, legal obligation under Ghanaian law, and legitimate interest in administering and improving the Programme in the public interest.<br><br>6. Sharing Your Information<br>We do not sell, rent, or trade your personal information. We may share your data with Programme implementing partners for training and administrative purposes; government ministries and agencies for reporting and compliance; accreditation bodies for issuing qualifications; potential employers only with your explicit consent; and law enforcement where required by law.<br><br>\_7. Data Retention<br>We retain your personal information for as long as necessary to fulfil the purposes in this Policy or as required by law. Registration and training records will be retained for the duration of the four-year Programme and for a period thereafter for certification and audit purposes. Upon expiry of the retention period, your data will be securely deleted or anonymised.<br><br>8. Data Security<br>We implement appropriate technical and organisational measures to protect your personal information, including encryption of data in transit and at rest, access controls, regular security assessments, and staff training on data protection obligations.<br><br>\_9. Cookies<br>Our digital platforms may use cookies to enhance your experience and collect usage data. You may control or disable cookies through your browser settings, though disabling essential cookies may affect platform functionality.<br><br>10. Your Rights<br>Under the Data Protection Act, 2012 (Act 843) of Ghana, you have the right to access, correct, or request deletion of your personal data; restrict or object to how it is processed; receive your data in a portable format; and withdraw consent at any time. To exercise any of these rights, please contact us. We will respond within 30 days.<br><br>11. Children&#039;s Privacy<br>The Programme is designed for adults meeting the eligibility criteria. We do not knowingly collect personal data from individuals under 18 without parental or guardian consent. If you believe a minor has submitted information without appropriate consent, please contact us immediately.<br><br>12. Changes to This Privacy Policy<br>We may update this Privacy Policy from time to time. We will notify you of significant changes through the Programme&#039;s official website or registered contact channels. The effective date at the top of this Policy reflects the most recent revision.<br><br>13. Contact and Complaints<br>For questions about this Privacy Policy or your personal data, please contact the Data Protection Officer at the Ministry of Communications and Digital Technology Innovation (MoCDTI), Accra, Ghana. For unresolved concerns, you have the right to lodge a complaint with the Data Protection Commission of Ghana."
