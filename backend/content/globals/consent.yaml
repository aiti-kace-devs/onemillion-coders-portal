title: Consent
data:
  content: "<p>1. Introduction and Acceptance</p><p>Welcome to the One Million Coders Programme (the &quot;Programme&quot;), a transformative four-year government initiative launched by the Ministry of Communications and Digital Technology Innovation (MoCDTI) of Ghana, in collaboration with the Ghana Investment Fund for Electronic Communications (GIFEC), the National Information Technology Agency (NITA), Ghana Digital Centre, and the Ghana-India Kofi Annan Centre of Excellence in ICT (GI-KACE).</p><p>By registering for or participating in the Programme, you agree to be bound by these Terms of Service. Please read them carefully before completing your registration. If you do not agree with any part of these Terms, you must not register for or participate in the Programme</p><p></p><p>2. Programme Overview</p><p>The One Million Coders Programme aims to train one million young Ghanaians in advanced ICT skills to foster a robust digital workforce capable of contributing to Ghana&#039;s digital transformation and economic growth. The Programme offers training benchmarked to international certification standards and delivers remote and in-person services to local industries across Ghana.</p><p></p><p>\_3. Eligibility</p><p>Participation in the Programme is open to individuals who meet the following criteria:</p><p>- University graduates</p><p>- Senior High School (SHS) graduates</p><p>- Individuals with basic IT skills</p><p></p><p>Participants must be Ghanaian nationals or legal residents of Ghana. The Programme administrators reserve the right to verify eligibility at any stage of the registration or training process.</p><p></p><p>\_4. Registration</p><p>To participate in the Programme, you must complete the official registration process through the Programme&#039;s designated website or registration portal. By registering, you confirm that all information provided is accurate, current, and complete; that you will promptly update your information if any details change; and that you meet the eligibility criteria set out in Section 3. The Programme administrators reserve the right to reject, suspend, or revoke registration if any information is found to be false, misleading, or incomplete.</p><p></p><p>5. Courses and Training</p><p>The Programme currently offers training in the following areas:</p><p>- Cybersecurity</p><p>- Data Protection</p><p>- Artificial Intelligence (AI)</p><p>- Mobile Application Development</p><p>- Web Application Development</p><p>- Business Process Outsourcing (BPO Service Providers)</p><p>- Game Programming</p><p>- Animation Programming</p><p>- STEM Training</p><p></p><p>Course availability, content, schedules, and locations are subject to change at the discretion of the Programme administrators. Training takes place across the entire country of Ghana, ensuring nationwide accessibility.</p><p></p><p>6. Participant Obligations</p><p>As a participant, you agree to attend scheduled training sessions, conduct yourself with integrity and respect toward instructors and fellow participants, not engage in any form of academic dishonesty or plagiarism, comply with all applicable laws and regulations, and keep your login credentials secure and not share access with unauthorised persons.</p><p></p><p>7. Intellectual Property</p><p>All course materials, content, curricula, tools, and resources provided through the Programme are the intellectual property of the Programme administrators, their partners, or their licensors. You are granted a limited, non-exclusive, non-transferable licence to use these materials solely for the purpose of your participation in the Programme. You must not copy, reproduce, or distribute Programme materials without written permission, or use them for any commercial purpose.</p><p></p><p>8. Certification and Completion</p><p>Upon successful completion of a course or training module, participants may be eligible to receive a certificate of completion or a recognised qualification benchmarked to international standards, subject to meeting attendance requirements, passing any applicable assessments, and complying with these Terms throughout the Programme.</p><p></p><p>\_9. Disclaimers and Limitation of Liability</p><p>The Programme is provided on an &quot;as is&quot; basis. The Programme administrators make no warranties regarding the completeness or accuracy of course content, the uninterrupted availability of training platforms, or employment outcomes following Programme completion. To the fullest extent permitted by Ghanaian law, the Programme administrators and their partners shall not be liable for any indirect, incidental, or consequential damages arising out of your participation.</p><p></p><p>10. Termination and Suspension</p><p>The Programme administrators may terminate or suspend a participant&#039;s access at any time if the participant violates these Terms, engages in harmful or disruptive conduct, or provides fraudulent information during registration. Participants may withdraw from the Programme at any time by contacting the Programme administrators through official channels.</p><p></p><p>11. Governing Law</p><p>These Terms shall be governed by and construed in accordance with the laws of the Republic of Ghana. Any disputes arising out of or relating to these Terms shall be subject to the exclusive jurisdiction of the courts of Ghana.</p><p></p><p>\_12. Changes to These Terms</p><p>The Programme administrators reserve the right to update these Terms at any time. Participants will be notified of significant changes through the Programme&#039;s official website or registered contact channels. Continued participation following notice of changes constitutes acceptance of the revised Terms.</p><p></p><p>13. Contact Information</p><p>For questions regarding these Terms, please contact the Programme administrators through the official One Million Coders Programme website or the offices of the Ministry of Communications and Digital Technology Innovation (MoCDTI), Ghana.</p>"
